build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
  TooManyFunctions:
    active: false

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
  ReturnCount:
    max: 3
  ForbiddenComment:
    active: false
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - "Preview"
  NewLineAtEndOfFile:
    active: true

naming:
  FunctionNaming:
    excludes:
      - "**/*Test.kt"
      - "**/*Screen.kt"
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
  TopLevelPropertyNaming:
    constantPattern: "[A-Z][A-Za-z0-9]*|[a-z][a-zA-Z0-9]*"

exceptions:
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    excludes:
      - "**/*Test.kt"
